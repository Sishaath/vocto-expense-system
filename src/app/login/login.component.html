<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">V</div>
      <div class="logo-text">Voc<span>to</span></div>
    </div>
    <div class="login-sub">EXPENSE & APPROVAL SYSTEM</div>
    <div class="orange-bar"></div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your workspace</p>

    <div class="role-tabs">
      <button [class.active]="selectedRole === 'employee'" (click)="setRole('employee')">Employee</button>
      <button [class.active]="selectedRole === 'accounts'" (click)="setRole('accounts')">Accounts</button>
      <button [class.active]="selectedRole === 'md'" (click)="setRole('md')">MD</button>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@voctotechnologies.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" />
    </div>

    <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>

    <button class="btn-login" (click)="login()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In →' }}
    </button>

    <div class="demo-hint">
      <strong>Demo accounts</strong><br>
      Employee → admin&#64;voctotechnologies.com<br>
      Accounts → accounts&#64;voctotechnologies.com<br>
      MD → md&#64;voctotechnologies.com
    </div>
  </div>
</div>
